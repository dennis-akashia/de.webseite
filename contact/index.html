<div class='sub_header_banner'>
    <center>Kontakt</center>
</div>

<!-- content inner section -->
  <section id='contact' class='section' style='border-radius: 20px !important;margin-top: 40px;'>
    
    <form class='contact-form' method='POST' action="https://formspree.io/f/mpqyebqd">

        <span>Name*</span>
            <input type='text' placeholder='' name='name' id='name' required/>
        <span>E-Mail*</span>
            <input type='text' placeholder='' name='email' id='email' required/>
        <span>Firma</span>
            <input type='text' name='firma' id='firma' placeholder=''/>
        <span>Ihre Nachricht*</span>
            <textarea placeholder='' rows='5' name='nachricht' id='nachricht' required></textarea>
        <!-- Datenschutzerklärung Checkbox -->
        <label>
            <input type='checkbox' name='datenschutz' required>
            Ich habe die <a href='../datenschutz/' target='_blank'>Datenschutzerklärung</a> gelesen und bin damit einverstanden. *
        </label><br><br>
        <div class="cf-turnstile" data-sitekey="0x4AAAAAACBN3JBKe5ZZjkBO"></div>
        <button type='submit'>Senden</button>
    </form>
    <div class='map-container'>

    </div>
  </section>
